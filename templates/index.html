{% extends 'base.html' %}

{% block content %}
    <h1>{% block title %} Welcome to Serien name DB {% endblock %}</h1>
    <form action="/search" method="GET">
        <input type="text" name="such_name" placeholder="Suchen...">
        <button type="submit">Suchen</button>
    </form>
      {% for post in posts %}
        <a href="{{ url_for('serie_name', such_url=post[0]) }}">
            <h5>{{ post[1] }}</h5>
        </a>
        <hr>
    {% endfor %}
{% endblock %}
