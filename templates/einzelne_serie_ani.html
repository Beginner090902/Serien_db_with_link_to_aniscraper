{% extends 'base.html' %} {% block content %}

<div class="container mt-4">
  <div class="card shadow-lg p-3 mb-5 bg-body rounded">
    <div class="row g-0">
      <!-- LEFT: TEXT -->
      <div class="col-md-8">
        <div class="card-body">
          <h3 class="card-title">{{ post[2] }}</h3>

          <p class="card-text">
            <strong>URL:</strong> {{ post[1] }} <br />
            <strong>Jahr:</strong> <span id="year"></span> <br />
          </p>

          <!-- Buttons -->
          <div class="mt-3">
            <form id="myForm">
              <input type="hidden" name="type_of_media" value="anime" />
              <input type="hidden" name="language" value="Deutsch" />
              <input type="hidden" name="dlMode" value="Series" />
              <input type="hidden" name="cliProvider" value="VOE" />
              <input type="hidden" name="name" value="one-piece" />
              <input type="hidden" name="season_override" value="0" />

              <button type="submit" class="btn btn-success me-2">
                Download starten
              </button>
            </form>

            <a
              href="https://aniworld.to/anime/stream/{{ post[1] }}"
              target="_blank"
              class="btn btn-primary"
            >
              🌐 Go to Serie on Aniworld
            </a>
          </div>
        </div>
      </div>

      <!-- RIGHT: IMAGE -->
      <div
        class="col-md-4 d-flex align-items-center justify-content-center p-2"
      >
        <img
          id="myImg"
          class="img-fluid rounded"
          style="max-height: 250px; object-fit: cover"
        />
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch("/get_post_ani?such_url={{ post[1] }}")
      .then((response) => response.json())
      .then((data) => {
        console.log(data); // DEBUG

        document.getElementById("myImg").src = data.myImg;
        document.getElementById("year").innerText = data.year;
      });
  });
  const form = document.getElementById("myForm");

form.addEventListener("submit", function(event) {
  event.preventDefault(); // verhindert page reload

  const formData = new FormData(form);

  fetch("http://localhost:5001/", {
    method: "POST",
    body: formData    // FormData sendet die Felder als Form‑POST
  })
  .then(response => response.json())
  .then(data => {
    console.log("Erfolg:", data);
  })
  .catch(error => {
    console.error("Fehler:", error);
  });
});
</script>
{% endblock %}
